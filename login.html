<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Portal Login | UniStay Elite</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/responsive.css.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .login-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #f9fbff;
            background-image: radial-gradient(#2563eb 0.5px, transparent 0.5px);
            background-size: 24px 24px;
        }
        .login-card {
            background: white;
            padding: 48px;
            border-radius: 32px;
            box-shadow: 0 50px 100px -20px rgba(0,0,0,0.1), 0 30px 60px -30px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 440px;
            text-align: center;
        }
        @media (max-width: 480px) {
            .login-card { padding: 32px 24px; border-radius: 24px; }
        }
        #error-msg {
            display: none;
            background: #fee2e2;
            color: #991b1b;
            border: 1px solid #fecaca;
            padding: 12px 16px;
            border-radius: 10px;
            font-size: 0.9rem;
            margin-bottom: 20px;
            text-align: left;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card" data-aos="fade-up">
            <div style="width: 56px; height: 56px; background: #1e3a8a; color: white; border-radius: 16px; display: flex; align-items: center; justify-content: center; margin: 0 auto 24px;">
                <i data-lucide="home" style="width: 28px; height: 28px;"></i>
            </div>
            <h1 style="font-size: 1.8rem; margin-bottom: 8px;">Admin Portal</h1>
            <p style="color: #64748b; font-size: 0.95rem; margin-bottom: 32px;">Secure access for agency partners</p>

            <div id="error-msg">Incorrect email or password. Please try again.</div>

            <form id="login-form" style="text-align: left;" novalidate>
                <div style="margin-bottom: 20px;">
                    <label style="display: block; font-size: 0.8rem; font-weight: 700; color: #0f172a; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px;">Email Address</label>
                    <div style="position: relative;">
                        <i data-lucide="mail" style="position: absolute; left: 16px; top: 50%; transform: translateY(-50%); width: 18px; color: #94a3b8;"></i>
                        <input type="email" id="email" value="agent@unistayelite.com" required
                            style="width: 100%; padding: 14px 14px 14px 48px; border-radius: 12px; border: 1px solid #e2e8f0; font-size: 1rem; outline: none;">
                    </div>
                </div>
                <div style="margin-bottom: 24px;">
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px;">
                        <label style="font-size: 0.8rem; font-weight: 700; color: #0f172a; text-transform: uppercase; letter-spacing: 0.5px;">Password</label>
                        <a href="#" style="font-size: 0.8rem; font-weight: 700; color: #2563eb;">Forgot?</a>
                    </div>
                    <div style="position: relative;">
                        <i data-lucide="lock" style="position: absolute; left: 16px; top: 50%; transform: translateY(-50%); width: 18px; color: #94a3b8;"></i>
                        <input type="password" id="password" placeholder="Enter password" required
                            style="width: 100%; padding: 14px 14px 14px 48px; border-radius: 12px; border: 1px solid #e2e8f0; font-size: 1rem; outline: none;">
                        <button type="button" id="toggle-pw" style="position: absolute; right: 14px; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; color: #94a3b8; padding: 4px;">
                            <i data-lucide="eye" style="width: 18px;"></i>
                        </button>
                    </div>
                </div>

                <div style="display: flex; align-items: center; gap: 10px; margin-bottom: 32px;">
                    <input type="checkbox" id="remember" checked>
                    <label for="remember" style="font-size: 0.9rem; color: #64748b;">Keep me logged in for 30 days</label>
                </div>

                <button type="submit" id="submit-btn" class="btn btn-primary"
                    style="width: 100%; padding: 16px; border-radius: 12px; font-weight: 700; font-size: 1rem; background: #1e3a8a; border: none; box-shadow: 0 20px 25px -5px rgba(30, 58, 138, 0.3);">
                    Login to Dashboard
                </button>
            </form>

            <div style="margin-top: 40px; padding-top: 32px; border-top: 1px solid #f1f5f9; display: flex; align-items: center; justify-content: center; gap: 8px; color: #94a3b8; font-size: 0.8rem; font-weight: 600;">
                <i data-lucide="shield-check" style="width: 14px;"></i> Enterprise-grade security active
            </div>
            <p style="margin-top: 24px; font-size: 0.85rem; color: #64748b;">
                Need an admin account? <a href="contact.html" style="color: #2563eb; font-weight: 700;">Request access</a>
            </p>
        </div>
    </div>

    <script>
        // ── Session helpers (localStorage + cookie fallback) ──────────────────
        function setSession(email) {
            try { localStorage.setItem('admin_logged_in', 'true'); localStorage.setItem('admin_user', email); } catch(e) {}
            // Cookie fallback (expires 30 days)
            var d = new Date(); d.setTime(d.getTime() + 30*24*60*60*1000);
            document.cookie = 'admin_logged_in=true; expires=' + d.toUTCString() + '; path=/; SameSite=Lax';
            document.cookie = 'admin_user=' + encodeURIComponent(email) + '; expires=' + d.toUTCString() + '; path=/; SameSite=Lax';
        }

        function isLoggedIn() {
            try { if (localStorage.getItem('admin_logged_in') === 'true') return true; } catch(e) {}
            return document.cookie.split(';').some(function(c) { return c.trim().startsWith('admin_logged_in=true'); });
        }

        // Already logged in? Skip to dashboard
        if (isLoggedIn()) { window.location.href = 'admin.html'; }

        // ── Form submit ───────────────────────────────────────────────────────
        document.getElementById('login-form').addEventListener('submit', function(e) {
            e.preventDefault();

            var email    = document.getElementById('email').value.trim();
            var password = document.getElementById('password').value;
            var btn      = document.getElementById('submit-btn');
            var errBox   = document.getElementById('error-msg');

            var CORRECT_EMAIL    = 'agent@unistayelite.com';
            var CORRECT_PASSWORD = 'Precious@@@2026';

            errBox.style.display = 'none';
            btn.disabled = true;
            btn.textContent = 'Verifying…';

            // Small delay so the UI updates before sync work
            setTimeout(function() {
                if (email === CORRECT_EMAIL && password === CORRECT_PASSWORD) {
                    setSession(email);
                    window.location.href = 'admin.html';
                } else {
                    errBox.style.display = 'block';
                    btn.disabled = false;
                    btn.textContent = 'Login to Dashboard';
                    document.getElementById('password').value = '';
                    document.getElementById('password').focus();
                }
            }, 300);
        });

        // ── Show/hide password toggle ─────────────────────────────────────────
        document.getElementById('toggle-pw').addEventListener('click', function() {
            var pw = document.getElementById('password');
            var isHidden = pw.type === 'password';
            pw.type = isHidden ? 'text' : 'password';
            // swap icon
            var icon = this.querySelector('i');
            if (icon) { icon.setAttribute('data-lucide', isHidden ? 'eye-off' : 'eye'); }
            if (window.lucide) window.lucide.createIcons();
        });

        // ── Lucide icons (safe call) ──────────────────────────────────────────
        window.addEventListener('load', function() {
            if (window.lucide) window.lucide.createIcons();
        });
        if (document.readyState !== 'loading' && window.lucide) window.lucide.createIcons();
    </script>
</body>
</html>
